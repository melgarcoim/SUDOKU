<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Backtracking</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="cabecera">
        <h2>SILVESTRE MAURICIO MELGAR COIMBRA</h2>
        <p>ANÁLISIS DE ALGORITMO</p>
        <h3>TAREA: Algoritmo para resolver un Sudoku usando Backtracking</h3>
    </header>

    <main>
        <h1>Sudoku - Backtracking</h1>

      
        <div id="sudoku-board"></div>

       
        <div class="controles">
            <select id="nivel">
                <option value="facil">Fácil</option>
                <option value="medio">Medio</option>
                <option value="dificil">Difícil</option>
            </select>

            <button id="btnNuevo">Nuevo Juego</button>
            <button id="btnVerificar">Verificar</button>
            <button id="btnPista">Pista</button>
            <button id="btnResolver">Resolver</button>
        </div>

        <!-- Mensajes -->
        <div id="mensaje"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
